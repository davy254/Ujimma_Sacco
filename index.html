<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ujima AI Loan Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .metric-card {
      text-align: center;
      padding: 20px;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <h2 class="text-center mb-4">🤖 Ujima AI Loan System Dashboard</h2>

  <!-- METRICS -->
  <div class="row" id="metrics">

    <div class="col-md-3">
      <div class="card metric-card">
        <h5>Total Applications</h5>
        <h2 id="totalApps">0</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card metric-card">
        <h5>Approved</h5>
        <h2 id="approved">0</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card metric-card">
        <h5>Rejected</h5>
        <h2 id="rejected">0</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card metric-card">
        <h5>Time Saved (hrs)</h5>
        <h2 id="timeSaved">0</h2>
      </div>
    </div>

  </div>

  <!-- BUTTON -->
  <div class="text-center mt-4">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#formModal">
      Apply for Loan
    </button>
  </div>

  <!-- GOOGLE FORM MODAL -->
  <div class="modal fade" id="formModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5>Loan Application Form</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <iframe src="https://forms.gle/XzWhVsJjNWwd7ycb9"></iframe>
        </div>

      </div>
    </div>
  </div>

  <!-- AGENT OUTPUT -->
  <div class="row mt-4">

    <div class="col-md-4">
      <div class="card p-3">
        <h5>🦁 Scout Output</h5>
        <p id="scout">Loading...</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>🛡️ Guardian Decision</h5>
        <p id="guardian">Loading...</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>🎯 Hunter Report</h5>
        <p id="hunter">Loading...</p>
      </div>
    </div>

  </div>

  <!-- FEEDBACK -->
  <div class="card mt-4 p-3">
    <h5>💬 Latest Feedback</h5>
    <p id="feedback">Loading...</p>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxexh-vIbB7zUQ7-VWmrL0kHq3oyps43grXfwctGOYYylHIl8__F_-fbBQdNHxlcOCD/exec";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  let total = data.length;
  let approved = 0;
  let rejected = 0;
  let timeSaved = total * 13 / 60;

  let latest = data[data.length - 1];

  data.forEach(row => {
    if(row.Final_Status === "APPROVE") approved++;
    if(row.Final_Status === "REJECT") rejected++;
  });

  document.getElementById("totalApps").innerText = total;
  document.getElementById("approved").innerText = approved;
  document.getElementById("rejected").innerText = rejected;
  document.getElementById("timeSaved").innerText = timeSaved.toFixed(1);

  document.getElementById("scout").innerText = latest.Scout_Output || "";
  document.getElementById("guardian").innerText = latest.Guardian_Output || "";
  document.getElementById("hunter").innerText = latest.Hunter_Output || "";
  document.getElementById("feedback").innerText = latest.Feedback_To_User || "";
}

loadData();
setInterval(loadData, 10000);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
